services:

  api:
    image: python:3.12-slim
    container_name: reel-api

    working_dir: /app

    command: tail -f /dev/null

    volumes:
      - ./backend:/app
      - ./storage:/storage
      - ./logs:/logs

    ports:
      - "127.0.0.1:8000:8000"

    restart: unless-stopped

    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine

    container_name: reel-redis

    restart: unless-stopped

    ports:
      - "127.0.0.1:6379:6379"

  postgres:
    image: postgres:16-alpine

    container_name: reel-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: reel
      POSTGRES_PASSWORD: reelpass
      POSTGRES_DB: reeldb

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "127.0.0.1:5432:5432"

volumes:
  postgres_data:
